<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Sentinel Garant</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #080b10;
  --bg2:       #0d1117;
  --surface:   #111620;
  --surface2:  #161c28;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.11);

  /* Единственный акцентный цвет — изумрудный тил */
  --teal:      #00d4aa;
  --teal-dim:  rgba(0,212,170,0.1);
  --teal-glow: rgba(0,212,170,0.2);
  --teal-mid:  rgba(0,212,170,0.55);

  --text:      #e2e8f0;
  --text2:     #7c8a9e;
  --text3:     #3d4a5c;

  --green:     #00d4aa;
  --orange:    #f59e0b;
  --red:       #ef4444;
  --blue:      #3b82f6;

  --r:         18px;
  --r-sm:      12px;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── AMBIENT ── */
body::before {
  content: '';
  position: fixed;
  top: -30%;
  left: 50%;
  transform: translateX(-50%);
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(0,212,170,0.055) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

/* ── GRID ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* ── SHELL ── */
.app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 16px 52px;
}

/* ── NAV ── */
nav {
  width: 100%;
  max-width: 460px;
  padding: 18px 0 0;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: fadeDown .45s cubic-bezier(.22,1,.36,1) both;
}

.brand {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--teal-dim);
  border: 1px solid rgba(0,212,170,0.28);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 18px var(--teal-glow);
  flex-shrink: 0;
}

.brand svg { width: 17px; height: 17px; }

.brand-text { flex: 1; }
.brand-name {
  font-size: 13px; font-weight: 700;
  letter-spacing: -.01em; line-height: 1;
  color: var(--text);
}
.brand-sub {
  font-size: 9px; font-weight: 400;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--text3); margin-top: 2px;
}

.live-badge {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  background: var(--teal-dim);
  border: 1px solid rgba(0,212,170,0.22);
  border-radius: 20px;
  font-size: 9px; font-weight: 700;
  color: var(--teal); letter-spacing: .08em;
  text-transform: uppercase;
}
.live-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--teal);
  animation: pulse 2s ease infinite;
}

/* ── SEP ── */
.sep {
  width: 100%; max-width: 460px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
  margin: 14px 0;
  animation: fadeIn .4s .1s both;
}

/* ── CARD ── */
.card {
  width: 100%; max-width: 460px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  animation: fadeUp .5s .06s cubic-bezier(.22,1,.36,1) both;
}

/* ── CARD TOP ── */
.card-top {
  padding: 16px 18px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

.id-block { display: flex; flex-direction: column; gap: 3px; }
.id-label {
  font-size: 8px; text-transform: uppercase;
  letter-spacing: .14em; color: var(--text3);
}
.id-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 21px; font-weight: 500;
  color: var(--teal); letter-spacing: .03em;
}

/* ── STATUS CHIP ── */
.chip {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: 20px;
  font-size: 10px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  white-space: nowrap;
}
.chip-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.s-pending    { background: rgba(245,158,11,.1); color: var(--orange); border: 1px solid rgba(245,158,11,.22); }
.s-nft_sent   { background: rgba(59,130,246,.1); color: var(--blue);   border: 1px solid rgba(59,130,246,.22); }
.s-stars_sent { background: var(--teal-dim);     color: var(--teal);   border: 1px solid rgba(0,212,170,.22); }
.s-completed  { background: var(--teal-dim);     color: var(--teal);   border: 1px solid rgba(0,212,170,.22); }
.s-cancelled  { background: rgba(239,68,68,.1);  color: var(--red);    border: 1px solid rgba(239,68,68,.22); }
.s-dispute    { background: rgba(239,68,68,.1);  color: var(--red);    border: 1px solid rgba(239,68,68,.22); }

/* ── SECTION ── */
.section {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.section:last-child { border-bottom: none; }

/* ── NFT ── */
.nft-row { display: flex; align-items: center; gap: 13px; }
.nft-icon {
  width: 48px; height: 48px; flex-shrink: 0;
  border-radius: 13px;
  background: linear-gradient(135deg, var(--teal-dim), rgba(59,130,246,.08));
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.nft-info { flex: 1; min-width: 0; }
.nft-type {
  font-size: 9px; text-transform: uppercase;
  letter-spacing: .12em; color: var(--text3); margin-bottom: 4px;
}
.nft-name {
  font-size: 15px; font-weight: 600;
  color: var(--text); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.nft-link {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--teal);
  text-decoration: none; opacity: .75;
  display: block; margin-top: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── PRICE ── */
.price-row {
  display: flex; align-items: center;
  justify-content: space-between;
}
.price-lbl {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: .1em; color: var(--text2);
}
.price-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 30px; font-weight: 500;
  color: var(--teal);
  display: flex; align-items: baseline; gap: 7px;
}
.price-val em {
  font-size: 13px; font-weight: 400;
  color: var(--text3); font-style: normal;
  font-family: 'Inter', sans-serif;
}

/* ── COMMISSION ── */
.comm-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 10px 18px;
  background: rgba(0,212,170,.03);
  border-bottom: 1px solid var(--border);
}
.comm-lbl {
  font-size: 11px; color: var(--text3);
  display: flex; align-items: center; gap: 6px;
}
.comm-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--teal-mid);
}

/* ── PARTIES ── */
.parties { display: flex; flex-direction: column; gap: 10px; }
.party {
  display: flex; align-items: center;
  justify-content: space-between;
}
.party-l { display: flex; align-items: center; gap: 9px; }
.party-ico {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.party-lbl {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: .09em; color: var(--text3);
}
.party-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 500; color: var(--text);
}

/* ── STEPS ── */
.steps-lbl {
  font-size: 9px; text-transform: uppercase;
  letter-spacing: .14em; color: var(--text3);
  margin-bottom: 14px;
}

.step {
  display: flex; gap: 11px;
  margin-bottom: 13px;
  animation: fadeRight .4s both;
}
.step:nth-child(2) { animation-delay: .04s; }
.step:nth-child(3) { animation-delay: .08s; }
.step:nth-child(4) { animation-delay: .12s; }
.step:last-child   { margin-bottom: 0; }

.step-l {
  display: flex; flex-direction: column;
  align-items: center; flex-shrink: 0;
}
.snum {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  transition: all .3s;
}
.snum.done {
  border-color: var(--teal);
  background: var(--teal-dim);
  color: var(--teal);
}
.sline {
  width: 1.5px; flex: 1; min-height: 6px;
  background: var(--border); margin: 3px 0;
}
.step-body { padding-top: 1px; }
.step-t { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; }
.step-s { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ── META ── */
.meta-row {
  display: flex; align-items: center;
  justify-content: space-between;
}
.meta-item { text-align: center; }
.meta-l {
  font-size: 9px; text-transform: uppercase;
  letter-spacing: .1em; color: var(--text3); margin-bottom: 4px;
}
.meta-v {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text2);
}

/* ── BUTTON ── */
.btn {
  width: 100%; max-width: 460px;
  margin: 12px auto 0;
  padding: 15px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center;
  justify-content: center; gap: 8px;
  text-decoration: none;
  transition: background .15s, transform .1s;
  animation: fadeUp .5s .15s cubic-bezier(.22,1,.36,1) both;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(.98); background: var(--surface2); }
.btn.primary {
  background: var(--teal-dim);
  border-color: rgba(0,212,170,.3);
  color: var(--teal);
}

/* ── NOTE ── */
.note {
  width: 100%; max-width: 460px;
  margin: 10px auto 0;
  padding: 13px 15px;
  background: rgba(0,212,170,.05);
  border: 1px solid rgba(0,212,170,.14);
  border-radius: var(--r-sm);
  font-size: 11px; line-height: 1.65;
  color: rgba(0,212,170,.7);
  animation: fadeUp .5s .2s cubic-bezier(.22,1,.36,1) both;
}
.note strong { color: var(--teal); }

/* ── NO DEAL ── */
.empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 80px 32px; gap: 14px;
  animation: fadeUp .5s cubic-bezier(.22,1,.36,1) both;
}
.empty-icon { font-size: 48px; opacity: .25; }
.empty-title { font-size: 19px; font-weight: 700; }
.empty-sub { font-size: 13px; color: var(--text2); line-height: 1.6; }

/* ── ANIMATIONS ── */
@keyframes fadeDown  { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:none; } }
@keyframes fadeUp    { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:none; } }
@keyframes fadeRight { from { opacity:0; transform:translateX(-9px);  } to { opacity:1; transform:none; } }
@keyframes fadeIn    { from { opacity:0; } to { opacity:1; } }
@keyframes pulse     { 0%,100% { opacity:1; } 50% { opacity:.3; } }
</style>
</head>
<body>
<div class="app">

  <nav>
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <polyline points="9 12 11 14 15 10"/>
      </svg>
    </div>
    <div class="brand-text">
      <div class="brand-name">Sentinel Garant</div>
      <div class="brand-sub">Escrow Service</div>
    </div>
    <div class="live-badge"><span class="live-dot"></span>Live</div>
  </nav>

  <div class="sep"></div>
  <div id="root"></div>

</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#080b10'); tg.setBackgroundColor('#080b10'); }

const p = Object.fromEntries(new URLSearchParams(location.search));

const ST = {
  pending:    { l:'Ожидает',    c:'s-pending',  i:'⏳', s:[0,0,0] },
  nft_sent:   { l:'NFT получен',c:'s-nft_sent', i:'📦', s:[1,0,0] },
  stars_sent: { l:'Оплачено',   c:'s-stars_sent',i:'⭐',s:[1,1,0] },
  completed:  { l:'Завершена',  c:'s-completed',i:'✅', s:[1,1,1] },
  cancelled:  { l:'Отменена',   c:'s-cancelled',i:'❌', s:[0,0,0] },
  dispute:    { l:'Спор',       c:'s-dispute',  i:'⚠️', s:[0,0,0] },
};

const STEPS = [
  { t:'Продавец отправляет NFT гаранту',       s:'на аккаунт @SentinelGarant' },
  { t:'Покупатель переводит Stars гаранту',    s:'цена + 25⭐ комиссия → @SentinelGarant' },
  { t:'Гарант проверяет и завершает сделку',   s:'обе стороны получают активы' },
];

function num(n){ return Number(n||0).toLocaleString('ru'); }

function render(){
  const root = document.getElementById('root');
  if(!p.id){
    root.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Сделка не найдена</div><div class="empty-sub">Перейдите по ссылке которую отправил участник сделки.</div></div>`;
    return;
  }

  const st = ST[p.status] || ST.pending;
  const comm = p.commission || 25;
  const nftShort = (p.link||'').replace('https://','');

  const stepsHTML = STEPS.map((s,i)=>{
    const last = i===STEPS.length-1;
    const done = st.s[i];
    return `<div class="step">
      <div class="step-l">
        <div class="snum${done?' done':''}">${done?'✓':i+1}</div>
        ${!last?'<div class="sline"></div>':''}
      </div>
      <div class="step-body">
        <div class="step-t">${s.t}</div>
        <div class="step-s">${s.s}</div>
      </div>
    </div>`;
  }).join('');

  root.innerHTML=`
    <div class="card">

      <div class="card-top">
        <div class="id-block">
          <div class="id-label">Deal ID</div>
          <div class="id-val">#${p.id}</div>
        </div>
        <div class="chip ${st.c}">
          <span class="chip-dot"></span>
          ${st.i} ${st.l}
        </div>
      </div>

      <div class="section">
        <div class="nft-row">
          <div class="nft-icon">🖼️</div>
          <div class="nft-info">
            <div class="nft-type">Telegram NFT</div>
            <div class="nft-name">${p.nft||'—'}</div>
            ${p.link?`<a class="nft-link" href="${p.link}" target="_blank">↗ ${nftShort}</a>`:''}
          </div>
        </div>
      </div>

      <div class="section">
        <div class="price-row">
          <div class="price-lbl">Цена сделки</div>
          <div class="price-val">⭐ ${num(p.price)} <em>Stars</em></div>
        </div>
      </div>

      <div class="comm-row">
        <div class="comm-lbl">💰 Комиссия гаранта</div>
        <div class="comm-val">+ ${comm} ⭐</div>
      </div>

      <div class="section">
        <div class="parties">
          <div class="party">
            <div class="party-l">
              <div class="party-ico">📤</div>
              <div class="party-lbl">Продавец</div>
            </div>
            <div class="party-name">@${p.seller||'—'}</div>
          </div>
          <div class="party">
            <div class="party-l">
              <div class="party-ico">📥</div>
              <div class="party-lbl">Покупатель</div>
            </div>
            <div class="party-name">@${p.buyer||'—'}</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="steps-lbl">Этапы сделки</div>
        ${stepsHTML}
      </div>

      <div class="section">
        <div class="meta-row">
          <div class="meta-item">
            <div class="meta-l">Создана</div>
            <div class="meta-v">${p.created||'—'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-l">Гарант</div>
            <div class="meta-v">@SentinelGarant</div>
          </div>
          <div class="meta-item">
            <div class="meta-l">Статус</div>
            <div class="meta-v">${st.i} ${st.l}</div>
          </div>
        </div>
      </div>

    </div>

    <a class="btn primary" href="https://t.me/SentinelGarant" target="_blank">
      💬 Написать гаранту
    </a>

    <div class="note">
      <strong>🛡 Защита гаранта:</strong> Активы хранятся у гаранта и передаются только после ручного подтверждения. Не переводите средства напрямую участникам сделки.
    </div>
  `;
}

render();
</script>
</body>
</html>
